function generateSignedMrnPdf(mrnData, signatureImage) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");
  const W = 210, M = 15;
  const vendor = mrnData.vendor || {};
  const shoes = mrnData.shoeDetails || [];
  const warehouse = mrnData.warehouse || "Delhi";
  const mrnId = mrnData.id || "MRN-0001";
  const dateStr = mrnData.createdAt || new Date().toLocaleDateString("en-IN");

  // ── Page 1: MRN Document ──
  doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text("CREP DOG CREW", M, 18);
  doc.setFontSize(12); doc.text("MATERIAL RECEIVING NOTE", M, 26);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("Ref: " + mrnId, M, 33);
  doc.text("Date: " + dateStr, W - M - 40, 33);

  // Vendor details box
  let y = 40;
  doc.setDrawColor(0); doc.rect(M, y, W - 2*M, 32);
  doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("VENDOR DETAILS", M + 4, y + 6);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  const vLines = [
    `Name: ${vendor.name || "—"}`,
    `Contact: ${vendor.phone || "—"}     Email: ${vendor.email || "—"}`,
    `PAN: ${vendor.pan || "—"}`,
    `Address: ${vendor.address || "—"}`
  ];
  vLines.forEach((l, i) => doc.text(l, M + 4, y + 13 + i * 5));

  // Warehouse box (right side — shows all 3 with checkmark on selected)
  const whX = 120, whY = 40;
  doc.rect(whX, whY, W - M - whX, 32);
  let wy = whY + 6;
  Object.entries(WAREHOUSES_V).forEach(([key, wh]) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(8);
    const label = key === warehouse ? wh.label + "  ✓" : wh.label;
    doc.text(label, whX + 4, wy);
    doc.setFont("helvetica","normal"); doc.setFontSize(7);
    wy += 3;
    doc.text(wh.lines.join(" "), whX + 4, wy);
    wy += 5;
  });

  // Shoe table (matching original: S.NO, SKU, ITEMS DETAILS, SIZE(UK), QTY, PAYOUT, CONSIGN/CASHOUT)
  y += 14;
  const cols = [M, M+12, M+38, M+100, M+122, M+136, M+158];
  const colR = W - M;
  const headers = ["S.NO","SKU","ITEMS DETAILS","SIZE (UK)","QTY","PAYOUT","CONSIGN/CASHOUT"];
  doc.setFillColor(240,240,240); doc.rect(M, y, colR-M, 7, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(7);
  headers.forEach((h, i) => doc.text(h, cols[i] + 2, y + 5));
  y += 7;

  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  let totalPV = 0;
  const maxRows = 15;
  for (let i = 0; i < maxRows; i++) {
    if (y > 240) { doc.addPage(); y = 20; }
    doc.rect(M, y, colR-M, 6);
    if (i < shoes.length) {
      const s = shoes[i];
      doc.text(String(i + 1), cols[0] + 4, y + 4.5);
      doc.text((s.sku || "").slice(0,12), cols[1] + 2, y + 4.5);
      doc.text(`${s.brand || ""} ${s.model || ""}`.slice(0, 28), cols[2] + 2, y + 4.5);
      doc.text(s.size || "", cols[3] + 4, y + 4.5);
      doc.text("1", cols[4] + 6, y + 4.5);
      const pv = s.purchaseValue || 0;
      totalPV += pv;
      doc.text(pv.toLocaleString("en-IN"), cols[5] + 2, y + 4.5);
      doc.text(s.mode || "Consign", cols[6] + 2, y + 4.5);
    } else {
      doc.text(String(i + 1), cols[0] + 4, y + 4.5);
    }
    y += 6;
  }

  // Total row
  doc.setFillColor(230,230,230); doc.rect(M, y, colR-M, 7, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("TOTAL", cols[1] + 2, y + 5);
  doc.text(String(shoes.length), cols[4] + 6, y + 5);
  doc.text(totalPV.toLocaleString("en-IN"), cols[5] + 2, y + 5);
  y += 14;

  // Signature
  doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("SIGNATURE OF SELLER", M + 4, y);
  y += 3;
  if (signatureImage) {
    try { doc.addImage(signatureImage, "PNG", M + 4, y, 50, 20); } catch(e) {}
  }
  y += 24;
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Signed on: " + new Date().toLocaleDateString("en-IN"), M + 4, y);

  // ── Page 2: T&C ──
  doc.addPage();
  let y2 = 18;
  doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("TERMS & CONDITIONS", M, y2); y2 += 10;
  TC_CLAUSES_V.forEach(c => {
    if (y2 > 265) { doc.addPage(); y2 = 20; }
    doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(c.title, M, y2); y2 += 5;
    doc.setFont("helvetica","normal"); doc.setFontSize(8);
    const lines = doc.splitTextToSize(c.body, W - 2*M);
    doc.text(lines, M, y2); y2 += lines.length * 4 + 4;
  });

  // FOR CDC USE ONLY
  y2 += 6;
  doc.setDrawColor(0); doc.rect(M, y2, W-2*M, 20);
  doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("FOR CDC USE ONLY", M + 4, y2 + 7);
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Received by: _______________    Date: _______________    Condition check: ☐ Pass  ☐ Fail", M + 4, y2 + 14);

  return doc.output("datauristring");
}

// ─── Google Drive Upload (for signed MRN PDFs) ───
async function uploadMrnToDrive(mrnData, pdfDataUri) {
  // Try server-side upload first (works when Express server is running)
  try {
    const res = await fetch("/api/drive/mrn-upload", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        vendorName: mrnData.vendor?.name || mrnData.vendorName,
        mrnId: mrnData.id,
        pdfData: pdfDataUri,
      }),
    });
    if (res.ok) {
      const data = await res.json();
      return data; // {driveLink, fileName}
    }
  } catch(e) {
    console.log("Server Drive upload unavailable, using local save fallback");
  }

  // Fallback: download the PDF locally (user can manually upload to Drive)
  const link = document.createElement("a");
  link.href = pdfDataUri;
  link.download = `MRN_${mrnData.id}_Signed_${new Date().toISOString().slice(0,10)}.pdf`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  return { driveLink: null, fileName: link.download, downloadedLocally: true };
}

// ─── Dashboard with Consignment Workflow ───
function Dashboard({vendor,onLogout}){
  const[activeTab,setActiveTab]=useState("my-shoes");
  const[shoes,setShoes]=useState([]);
  const[batches,setBatches]=useState([]);
  const[notifications,setNotifications]=useState([]);
  const[mrns,setMrns]=useState([]);
  const[pvChanges,setPvChanges]=useState([]);
  const[search,setSearch]=useState("");
  const[statusFilter,setStatusFilter]=useState("all");
  const[loading,setLoading]=useState(true);
  const[showBatchUpload,setShowBatchUpload]=useState(false);
  const[batchRows,setBatchRows]=useState([{brand:"",model:"",size:"",sku:"",condition:"Deadstock",purchaseValue:""}]);
  const[batchSubmitting,setBatchSubmitting]=useState(false);
  const[batchMessage,setBatchMessage]=useState("");
  const[expandedMrn,setExpandedMrn]=useState(null);
  const[signingMrnId,setSigningMrnId]=useState(null);
  const sigCanvasRef=useRef(null);
  const sigDrawingRef=useRef(false);

  // Status badge colors for consignment lifecycle
  const statusColors={
    submitted:{bg:"#fef3c7",color:"#d97706",label:"Submitted"},
    approved:{bg:"#dbeafe",color:"#2563eb",label:"Approved"},
    shipped:{bg:"#cffafe",color:"#0891b2",label:"Shipped"},
    authenticated:{bg:"#dcfce7",color:"#16a34a",label:"Authenticated"},
    consigned:{bg:"#d1d5db",color:"#374151",label:"Consigned"},
    available:{bg:"#e0e7ff",color:"#4f46e5",label:"Available"},
    sold:{bg:"#f0fdf4",color:"#16a34a",label:"Sold"},
    rejected_intake:{bg:"#fee2e2",color:"#dc2626",label:"Rejected (Intake)"},
    rtv:{bg:"#fee2e2",color:"#7f1d1d",label:"RTV"},
    pv_change_pending:{bg:"#fed7aa",color:"#92400e",label:"PV Change Pending"}
  };

  const ukSizes=["3","3.5","4","4.5","5","5.5","6","6.5","7","7.5","8","8.5","9","9.5","10","10.5","11","11.5","12","12.5","13","14"];
  const conditions=["Deadstock","VNDS","Used"];

  // Fetch data on mount + listen for real-time MRN sync from admin portal
  const refreshData=async()=>{
    try{
      const[shoesList,batchesList,notifList,mrnsList,pvList]=await Promise.all([
        apiGet(`/api/shoes?vendorId=${vendor.id}`),
        apiGet(`/api/batches?vendorId=${vendor.id}`),
        apiGet(`/api/notifications?vendorId=${vendor.id}`),
        apiGet(`/api/mrns?vendorId=${vendor.id}`),
        apiGet(`/api/shoes?vendorId=${vendor.id}&pvChangeOnly=true`)
      ]);
      setShoes(shoesList||[]);
      setBatches(batchesList||[]);
      setNotifications(notifList||[]);
      setMrns(mrnsList||[]);
      setPvChanges(pvList.filter(s=>s.pvChangeStatus==="pending")||[]);
    }catch(e){
      console.error("Failed to fetch data:",e);
    }finally{
      setLoading(false);
    }
  };

  useEffect(()=>{
    refreshData();

    // ── Real-time Server-Sent Events (SSE) — instant updates from server ──
    let evtSource=null;
    try{
      evtSource=new EventSource(`/api/sse/vendor/${vendor.id}`);
      evtSource.addEventListener("mrn_created",(e)=>{
        console.log("📋 [LIVE] New MRN received from admin portal!");
        refreshData();
      });
      evtSource.addEventListener("batch_reviewed",(e)=>{
        console.log("✅ [LIVE] Batch reviewed by admin!");
        refreshData();
      });
      evtSource.onerror=()=>{
        console.log("SSE connection lost, falling back to polling...");
      };
    }catch(e){
      console.log("SSE not available, using polling fallback");
    }

    // Fallback: localStorage sync for offline mode
    const handleStorageChange=(e)=>{
      if(e.key==="cdc_synced_mrns"||e.key==="cdc_synced_notifications"){
        refreshData();
      }
    };
    window.addEventListener("storage",handleStorageChange);

    // Poll every 5s as ultimate fallback
    const pollInterval=setInterval(()=>{refreshData();},5000);

    return()=>{
      if(evtSource)evtSource.close();
      window.removeEventListener("storage",handleStorageChange);
      clearInterval(pollInterval);
    };
  },[vendor.id]);

  // Mark notification as read
  const markNotificationRead=async(id)=>{
    try{
      await api(`/api/notifications/${id}/read`,{});
      setNotifications(n=>n.map(x=>x.id===id?{...x,read:true}:x));
    }catch(e){
      console.error("Failed to mark notification read:",e);
    }
  };

  // Handle Excel file upload
  const handleExcelUpload=(file)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=new Uint8Array(e.target.result);
        const workbook=XLSX.read(data,{type:'array'});
        const firstSheet=workbook.Sheets[workbook.SheetNames[0]];
        const jsonData=XLSX.utils.sheet_to_json(firstSheet,{defval:""});

        if(jsonData.length===0){
          setBatchMessage("Error: No data found in the Excel file");
          return;
        }

        // Map columns flexibly (handle various header names)
        const mapCol=(row,keys)=>{
          for(const k of keys){
            const match=Object.keys(row).find(h=>h.toLowerCase().replace(/[^a-z]/g,"").includes(k));
            if(match&&row[match]!==undefined&&row[match]!=="")return String(row[match]);
          }
          return "";
        };

        const rows=jsonData.map(row=>({
          brand:mapCol(row,["brand"]),
          model:mapCol(row,["model","name","product","shoe"]),
          size:mapCol(row,["size"]),
          sku:mapCol(row,["sku","style","stylecode","articleno","article"]),
          condition:mapCol(row,["condition","cond"])||"Deadstock",
          purchaseValue:mapCol(row,["purchasevalue","pv","price","value","cost","amount"]),
        })).filter(r=>r.brand||r.model);

        if(rows.length===0){
          setBatchMessage("Error: Could not parse shoe data. Make sure columns include Brand, Model, Size, SKU, Condition, Purchase Value");
          return;
        }

        setBatchRows(rows);
        setBatchMessage(`✅ ${rows.length} shoes parsed from "${file.name}" — review and submit below`);
      }catch(err){
        console.error("Excel parse error:",err);
        setBatchMessage("Error: Failed to parse file. Make sure it's a valid Excel or CSV file.");
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // Handle batch upload
  const handleBatchSubmit=async()=>{
    const validRows=batchRows.filter(r=>r.brand&&r.model&&r.size&&r.sku&&r.purchaseValue);
    if(validRows.length===0){setBatchMessage("Please add at least one complete shoe entry");return;}
    setBatchSubmitting(true);
    setBatchMessage("");
    try{
      const payload={vendorId:vendor.id,vendorName:vendor.name,shoes:validRows.map(r=>({...r,purchaseValue:Number(r.purchaseValue)}))};
      const res=await api("/api/shoes/batch",payload);
      setBatchMessage(`Batch uploaded successfully! ${res.count||validRows.length} shoes added.`);
      setBatchRows([{brand:"",model:"",size:"",sku:"",condition:"Deadstock",purchaseValue:""}]);
      setTimeout(()=>setShowBatchUpload(false),2000);
      // Refetch shoes
      const updated=await apiGet(`/api/shoes?vendorId=${vendor.id}`);
      setShoes(updated||[]);
    }catch(e){
      setBatchMessage("Error: "+e.message);
    }finally{
      setBatchSubmitting(false);
    }
  };

  // Update batch row
  const updateBatchRow=(i,field,value)=>{
    const newRows=[...batchRows];
    newRows[i][field]=value;
    setBatchRows(newRows);
  };

  // Add batch row
  const addBatchRow=()=>{
    setBatchRows([...batchRows,{brand:"",model:"",size:"",sku:"",condition:"Deadstock",purchaseValue:""}]);
  };

  // Remove batch row
  const removeBatchRow=(i)=>{
    setBatchRows(batchRows.filter((_,j)=>j!==i));
  };

  // Handle PV change response
  const handlePvResponse=async(shoeId,response)=>{
    try{
      await api(`/api/shoes/${shoeId}/pv-response`,{response});
      setPvChanges(p=>p.filter(s=>s.id!==shoeId));
      const updated=await apiGet(`/api/shoes?vendorId=${vendor.id}`);
      setShoes(updated||[]);
    }catch(e){
      console.error("Failed to respond to PV change:",e);
    }
  };

  // Start MRN signing
  const startMrnSignature=(mrnId)=>{
    setSigningMrnId(mrnId);
    setTimeout(()=>{
      const c=sigCanvasRef.current;
      if(c){
        const ctx=c.getContext('2d');
        ctx.fillStyle='#fff';
        ctx.fillRect(0,0,c.width,c.height);
      }
    },100);
  };

  // Submit MRN signature — generates PDF and uploads to Google Drive
  const[mrnSaving,setMrnSaving]=useState(false);
  const[mrnDriveResult,setMrnDriveResult]=useState(null);

  const submitMrnSignature=async()=>{
    const c=sigCanvasRef.current;
    if(!c)return;
    const sigData=c.toDataURL('image/png');
    setMrnSaving(true);
    setMrnDriveResult(null);
    try{
      // 1. Sign the MRN in the database
      await api(`/api/mrn/${signingMrnId}/sign`,{vendorId:vendor.id,signatureImage:sigData});

      // 2. Generate signed MRN PDF
      const mrnData=mrns.find(m=>m.id===signingMrnId);
      if(mrnData){
        const pdfDataUri=generateSignedMrnPdf(mrnData,sigData);

        // 3. Upload to Google Drive (server if available, otherwise local download)
        const driveRes=await uploadMrnToDrive(mrnData,pdfDataUri);
        setMrnDriveResult(driveRes);

        // 4. Store Drive link in localStorage sync for admin to see
        try{
          const synced=JSON.parse(localStorage.getItem("cdc_synced_mrns")||"[]");
          const sm=synced.find(x=>x.id===signingMrnId);
          if(sm){
            sm.status="signed";
            sm.signedAt=new Date().toISOString().slice(0,10);
            sm.driveLink=driveRes?.driveLink||null;
            localStorage.setItem("cdc_synced_mrns",JSON.stringify(synced));
          }
        }catch(e){}
      }

      setSigningMrnId(null);
      const updated=await apiGet(`/api/mrns?vendorId=${vendor.id}`);
      setMrns(updated||[]);
    }catch(e){
      console.error("Failed to sign MRN:",e);
      alert("Failed to sign MRN: "+e.message);
    }finally{
      setMrnSaving(false);
    }

    const matchSearch=`${s.brand} ${s.model} ${s.sku}`.toLowerCase().includes(search.toLowerCase());
    const matchStatus=statusFilter==="all"||s.status===statusFilter;
    return matchSearch&&matchStatus;
  });

  const unreadCount=notifications.filter(n=>!n.read).length;

            <span className="dash-nav-title">Crep Dog Crew</span>
            <span className="dash-nav-sep">|</span>
            <span className="dash-nav-sub">Vendor Portal</span>
          </div>
          <div className="dash-nav-right">
            <button className="btn-icon" onClick={()=>setActiveTab("notifications")} title="Notifications" style={{position:'relative'}}>

            </button>
            <div className="dash-nav-user">
              <div className="dash-nav-avatar">{vendor.name.charAt(0)}</div>
              <span className="dash-nav-name">{vendor.name}</span>
            </div>
            <button className="btn-icon" onClick={onLogout} title="Sign out"><Svg.Logout /></button>
          </div>
        </div>
      </nav>

      {/* Content */}
      <div className="dash-content">
        {/* Tab Navigation */}
        <div className="tabs" style={{marginBottom:28}}>
          <button className={`tab ${activeTab==="my-shoes"?"active":""}`} onClick={()=>setActiveTab("my-shoes")}>My Shoes</button>
          <button className={`tab ${activeTab==="upload-batch"?"active":""}`} onClick={()=>setActiveTab("upload-batch")}>Upload Batch</button>
          <button className={`tab ${activeTab==="notifications"?"active":""}`} onClick={()=>setActiveTab("notifications")}>Notifications {unreadCount>0&&<span style={{marginLeft:6,background:'#ef4444',color:'#fff',borderRadius:'100px',padding:'2px 8px',fontSize:11,fontWeight:600}}>({unreadCount})</span>}</button>
          <button className={`tab ${activeTab==="mrns"?"active":""}`} onClick={()=>setActiveTab("mrns")}>MRNs</button>
          <button className={`tab ${activeTab==="pv-changes"?"active":""}`} onClick={()=>setActiveTab("pv-changes")}>PV Changes</button>
        </div>

        {/* TAB 1: MY SHOES */}
        {activeTab==="my-shoes"&&(
          <div>
            <div className="dash-welcome">
              <div><h1>My Shoes</h1><p>Track your consigned inventory</p></div>
            </div>

            {/* Status filter */}
            <div className="filter-btns" style={{marginBottom:20}}>
              <select className="form-input form-select" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{maxWidth:200}}>
                <option value="all">All Status</option>
                {Object.entries(statusColors).map(([key,val])=><option key={key} value={key}>{val.label}</option>)}
              </select>
              <input type="text" className="form-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search brand, model, SKU..." style={{flex:1,marginLeft:12}} />
            </div>

            {/* Shoes table */}
            <div className="inventory-card">
              <div style={{overflowX:'auto'}}>
                <table className="inventory-table">
                  <thead>
                    <tr>
                      <th>Brand/Model</th>
                      <th>SKU</th>
                      <th>Size</th>
                      <th>Condition</th>
                      <th>Purchase Value</th>
                      <th>Status</th>
                      <th>QR Code</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredShoes.length===0?(
                      <tr><td colSpan={7}><div className="empty-state" style={{padding:'80px 20px'}}><Svg.Sneaker /><p className="empty-title" style={{marginTop:12}}>No shoes found</p></div></td></tr>

                              style={{width:'100%',height:150,background:'#fff',borderRadius:4,border:'2px solid #d97706',cursor:'crosshair',marginBottom:12,display:'block'}}
                              onMouseDown={(e)=>{sigDrawingRef.current=true;const c=sigCanvasRef.current,r=c.getBoundingClientRect(),ctx=c.getContext('2d');ctx.beginPath();ctx.moveTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));}}
                              onMouseMove={(e)=>{if(!sigDrawingRef.current)return;const c=sigCanvasRef.current,r=c.getBoundingClientRect(),ctx=c.getContext('2d');ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#000';ctx.lineTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));ctx.stroke();}}
                              onMouseUp={()=>{sigDrawingRef.current=false;}}
                              onMouseLeave={()=>{sigDrawingRef.current=false;}}
                              onTouchStart={(e)=>{e.preventDefault();sigDrawingRef.current=true;const c=sigCanvasRef.current,r=c.getBoundingClientRect(),t=e.touches[0],ctx=c.getContext('2d');ctx.beginPath();ctx.moveTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));}}
                              onTouchMove={(e)=>{e.preventDefault();if(!sigDrawingRef.current)return;const c=sigCanvasRef.current,r=c.getBoundingClientRect(),t=e.touches[0],ctx=c.getContext('2d');ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#000';ctx.lineTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));ctx.stroke();}}
                              onTouchEnd={(e)=>{e.preventDefault();sigDrawingRef.current=false;}}

                              <button className="btn-outline" onClick={()=>setSigningMrnId(null)} style={{flex:1}}>Cancel</button>

                            <span style={{fontSize:14}}>📁</span>
                            <span style={{fontSize:12,color:'#1d4ed8',fontWeight:600}}>Saved to Google Drive</span>
                            <a href={m.driveLink} target="_blank" rel="noopener" style={{fontSize:11,color:'#4f46e5',marginLeft:'auto'}}>View in Drive →</a>
                          </div>
                        )}
                        {mrnDriveResult&&mrnDriveResult.downloadedLocally&&!m.driveLink&&(
                          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#fef3c7',borderRadius:6,marginTop:6}}>
                            <span style={{fontSize:14}}>💾</span>
                            <span style={{fontSize:12,color:'#92400e',fontWeight:600}}>PDF downloaded locally — upload to Drive when server is running</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* TAB 5: PV CHANGES */}
        {activeTab==="pv-changes"&&(
          <div>
            <div className="dash-welcome">
              <div><h1>Purchase Value Changes</h1><p>Respond to PV change requests</p></div>
            </div>

            {pvChanges.length===0?(
              <div className="inventory-card" style={{textAlign:'center',padding:'60px 20px'}}>
                <p style={{color:'#bbb',fontSize:14}}>No pending PV changes</p>
              </div>
            ):(
              pvChanges.map(s=>(
                <div key={s.id} style={{background:'#fff',border:'1px solid #fed7aa',borderRadius:14,padding:20,marginBottom:16,background:'#fffbeb'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:16}}>
                    <div>
                      <div style={{fontWeight:700,color:'#111',marginBottom:4}}>{s.brand} {s.model}</div>
                      <div style={{fontSize:13,color:'#666'}}>Size {s.size} · {s.condition}</div>
                    </div>
                    <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',borderRadius:'100py',fontSize:12,fontWeight:600,background:'#fed7aa',color:'#92400e'}}>Pending Review</span>
                  </div>

                  <div style={{background:'#fff',borderRadius:10,padding:12,marginBottom:16,border:'1px solid #fed7aa'}}>
                    <div style={{fontSize:12,color:'#666',marginBottom:8}}>Current Purchase Value</div>
                    <div style={{fontSize:18,fontWeight:700,color:'#111',marginBottom:16}}>{fmt(s.purchaseValue)}</div>

                    <div style={{fontSize:12,color:'#666',marginBottom:8}}>CDC Proposed Value</div>
                    <div style={{fontSize:18,fontWeight:700,color:'#d97706'}}>{fmt(s.proposedValue)}</div>

                    {s.pvChangeNote&&<div style={{fontSize:12,color:'#666',marginTop:12,fontStyle:'italic'}}>Note: {s.pvChangeNote}</div>}
                  </div>

                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-outline" onClick={()=>handlePvResponse(s.id,"rejected")} style={{flex:1}}>Reject</button>
                    <button className="btn-primary" onClick={()=>handlePvResponse(s.id,"accepted")} style={{flex:1}}>Accept</button>
                  </div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      <div className="dash-footer">Crep Dog Crew Pvt. Ltd. · Vendor Portal · 2026</div>
    </div>
  );
}


// ─── App ───
function App(){
  const[page,setPage]=useState("landing");
  // Restore logged-in session from localStorage
  const[vendor,setVendor]=useState(()=>{
    try{
      const saved=localStorage.getItem("cdc_vendor_session");
      if(saved){return JSON.parse(saved);}
    }catch(e){}
    return null;
  });

  // Wrap setVendor to persist/clear session
  const loginVendor=(v)=>{
    setVendor(v);
    try{localStorage.setItem("cdc_vendor_session",JSON.stringify(v));}catch(e){}
  };
  const logoutVendor=()=>{
    setVendor(null);
    setPage("landing");
    try{localStorage.removeItem("cdc_vendor_session");}catch(e){}
  };

  if(vendor)return <Dashboard vendor={vendor} onLogout={logoutVendor} />;
  if(page==="login")return <LoginPage onLogin={loginVendor} onGoToRegister={()=>setPage("register")} onBack={()=>setPage("landing")} />;
  if(page==="register")return <RegisterPage onRegister={loginVendor} onGoToLogin={()=>setPage("login")} onBack={()=>setPage("landing")} />;
  return <LandingPage onLogin={()=>setPage("login")} onRegister={()=>setPage("register")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
