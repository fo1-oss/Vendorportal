<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crep Dog Crew — Vendor Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f8f9fa;color:#111;-webkit-font-smoothing:antialiased}
  input,textarea,select,button{font-family:inherit}

  /* Buttons */
  .btn-ghost{padding:10px 24px;border:none;background:transparent;font-size:14px;font-weight:600;cursor:pointer;border-radius:12px;color:#333;transition:all .2s}
  .btn-ghost:hover{background:rgba(0,0,0,.05)}
  .btn-primary{padding:10px 28px;border:none;background:#000;color:#fff;font-size:14px;font-weight:600;cursor:pointer;border-radius:12px;transition:all .2s}
  .btn-primary:hover{background:#222}
  .btn-primary:disabled{background:#ccc;cursor:not-allowed}
  .btn-outline{padding:10px 28px;border:1.5px solid #ddd;background:#fff;color:#333;font-size:14px;font-weight:600;cursor:pointer;border-radius:12px;transition:all .2s}
  .btn-outline:hover{border-color:#999;background:#f9f9f9}
  .btn-icon{background:none;border:none;cursor:pointer;color:#aaa;padding:6px;border-radius:8px;transition:all .2s}
  .btn-icon:hover{color:#333;background:#f0f0f0}
  .btn-digilocker{padding:14px 28px;border:2px solid #1a56db;background:#1a56db;color:#fff;font-size:15px;font-weight:700;cursor:pointer;border-radius:14px;transition:all .2s;display:inline-flex;align-items:center;gap:10px;letter-spacing:-.2px}
  .btn-digilocker:hover{background:#1648b8}
  .btn-digilocker:disabled{background:#94a3b8;border-color:#94a3b8;cursor:not-allowed}
  .btn-digilocker-outline{padding:12px 24px;border:2px solid #1a56db;background:#fff;color:#1a56db;font-size:14px;font-weight:700;cursor:pointer;border-radius:14px;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
  .btn-digilocker-outline:hover{background:#eff6ff}

  /* Landing */
  .landing-page{min-height:100vh;display:flex;flex-direction:column}
  .landing-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;position:absolute;top:0;left:0;right:0;z-index:10}
  .landing-logo{display:flex;align-items:center;gap:10px}
  .landing-logo-icon{width:40px;height:40px;background:#000;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:18px}
  .landing-logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .landing-nav-btns{display:flex;gap:12px}
  .landing-hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 20px 60px;background:linear-gradient(165deg,#fafafa 0%,#f0f0f0 50%,#e8e8e8 100%);position:relative;overflow:hidden}
  .landing-hero::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.03) 0%,transparent 70%)}
  .hero-content{position:relative;z-index:1;max-width:700px}
  .hero-badge{display:inline-flex;align-items:center;gap:6px;background:#000;color:#fff;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;margin-bottom:24px;letter-spacing:.5px}
  .hero-title{font-size:56px;font-weight:900;line-height:1.1;letter-spacing:-2px;margin-bottom:20px;color:#000}
  .hero-subtitle{font-size:18px;color:#666;line-height:1.6;margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto}
  .hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .hero-btns .btn-primary,.hero-btns .btn-outline{padding:14px 36px;font-size:15px}
  .landing-features{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid #e5e5e5}
  .feature-card{padding:48px 40px;text-align:center;border-right:1px solid #e5e5e5;background:#fff}
  .feature-card:last-child{border-right:none}
  .feature-icon{width:48px;height:48px;background:#f5f5f5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .feature-title{font-size:16px;font-weight:700;margin-bottom:8px}
  .feature-desc{font-size:14px;color:#777;line-height:1.6}

  /* Auth pages */
  .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(165deg,#fafafa,#f0f0f0)}
  .auth-container{width:100%;max-width:440px}
  .reg-container{width:100%;max-width:580px}
  .auth-header{text-align:center;margin-bottom:32px}
  .auth-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
  .auth-logo-icon{width:44px;height:44px;background:#000;border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:20px}
  .auth-logo-text{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .auth-subtitle{color:#888;font-size:14px;margin-top:4px}
  .auth-card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid #eee;padding:32px}
  .auth-card h2{font-size:22px;font-weight:700;margin-bottom:4px}
  .auth-card-sub{color:#888;font-size:14px;margin-bottom:24px}
  .auth-footer{text-align:center;margin-top:24px;font-size:14px;color:#888}
  .auth-footer a,.auth-footer button{color:#000;font-weight:600;text-decoration:none;background:none;border:none;cursor:pointer;font-size:14px}
  .auth-footer button:hover{text-decoration:underline}
  .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:20px}
  .alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:20px}

  /* Forms */
  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
  .form-input{width:100%;padding:12px 16px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;background:#fafafa;outline:none;transition:all .2s}
  .form-input:focus{border-color:#000;background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
  .form-input.error{border-color:#ef4444;background:#fef2f2}
  .form-input::placeholder{color:#bbb}
  .form-hint{font-size:12px;color:#aaa;margin-top:4px}
  .form-error{font-size:12px;color:#ef4444;margin-top:4px}
  .form-textarea{resize:none;min-height:80px}
  .input-wrapper{position:relative}
  .input-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;padding:4px}
  .input-toggle:hover{color:#666}
  .form-actions{display:flex;gap:12px;margin-top:8px}
  .form-actions>*{flex:1}

  /* Steps */
  .step-indicator{display:flex;border-bottom:1px solid #eee;overflow-x:auto}
  .step-item{flex:1;padding:14px 6px;text-align:center;font-size:11px;font-weight:600;color:#ccc;cursor:default;position:relative;transition:color .2s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;min-width:0}
  .step-item.active{color:#000}
  .step-item.done{color:#000}
  .step-item.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#000}
  .step-num{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .step-num.pending{background:#f0f0f0;color:#aaa}
  .step-num.current{background:#000;color:#fff}
  .step-num.completed{background:#22c55e;color:#fff}

  /* Chips */
  .chip-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#f0f0f0;color:#555;padding:6px 12px;border-radius:100px;font-size:12px;font-weight:500}
  .chip-remove{background:none;border:none;cursor:pointer;color:#aaa;padding:0;font-size:16px;line-height:1}
  .chip-remove:hover{color:#ef4444}

  /* Review */
  .review-grid{background:#f8f8f8;border-radius:14px;padding:20px}
  .review-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
  .review-row+.review-row{border-top:1px solid #eee}
  .review-label{color:#888}
  .review-value{color:#111;font-weight:500;text-align:right;max-width:60%}

  /* DigiLocker KYC */
  .digilocker-card{border:2px solid #e5e5e5;border-radius:18px;padding:28px;margin-top:16px;transition:all .3s;background:#fff}
  .digilocker-card.active{border-color:#1a56db;background:#fafcff}
  .digilocker-card.complete{border-color:#22c55e;background:#f0fdf4}
  .digilocker-card.error{border-color:#ef4444;background:#fef2f2}
  .dl-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#1a56db,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .dl-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .dl-header-text h3{font-size:16px;font-weight:700;color:#111}
  .dl-header-text p{font-size:13px;color:#888;margin-top:2px}
  .dl-status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;margin-left:auto}
  .dl-status-badge.pending{background:#f0f0f0;color:#999}
  .dl-status-badge.active{background:#dbeafe;color:#1d4ed8}
  .dl-status-badge.success{background:#dcfce7;color:#16a34a}
  .dl-status-badge.error{background:#fee2e2;color:#dc2626}
  .dl-steps{margin:20px 0;padding:16px 20px;background:#f8fafc;border-radius:12px;font-size:13px;color:#555;line-height:1.8}
  .dl-steps ol{padding-left:18px;margin:0}
  .dl-steps li{padding:2px 0}
  .dl-result{margin-top:16px}
  .dl-result-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px}
  .dl-result-card.success{background:#f0fdf4;border:1.5px solid #bbf7d0}
  .dl-result-card.fail{background:#fef2f2;border:1.5px solid #fecaca}
  .dl-result-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .dl-result-icon.success{background:#dcfce7;color:#16a34a}
  .dl-result-icon.fail{background:#fee2e2;color:#dc2626}
  .dl-result-text{flex:1}
  .dl-result-title{font-size:14px;font-weight:700;color:#111}
  .dl-result-sub{font-size:12px;color:#888;margin-top:1px}

  /* Verification status cards */
  .verify-card{border:1.5px solid #e5e5e5;border-radius:14px;padding:20px;margin-top:16px;transition:all .3s}
  .verify-card.verifying{border-color:#f59e0b;background:#fffbeb}
  .verify-card.verified{border-color:#22c55e;background:#f0fdf4}
  .verify-card.failed{border-color:#ef4444;background:#fef2f2}
  .verify-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .verify-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .verify-status{font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;display:inline-flex;align-items:center;gap:5px}
  .verify-status.pending{background:#f0f0f0;color:#999}
  .verify-status.verifying{background:#fef3c7;color:#d97706}
  .verify-status.verified{background:#dcfce7;color:#16a34a}
  .verify-status.failed{background:#fee2e2;color:#dc2626}
  .verify-details{font-size:13px;color:#666;line-height:1.5}

  /* Spinner */
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:16px;height:16px;border:2px solid #fcd34d;border-top-color:#d97706;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
  .spinner-blue{width:16px;height:16px;border:2px solid #bfdbfe;border-top-color:#1a56db;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
  .spinner-lg{width:24px;height:24px;border:3px solid #bfdbfe;border-top-color:#1a56db;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

  /* T&C */
  .tc-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:14px;padding:16px;display:flex;align-items:flex-start;gap:12px;margin-top:16px;cursor:pointer}
  .tc-box input[type="checkbox"]{width:20px;height:20px;margin-top:2px;accent-color:#000;flex-shrink:0;cursor:pointer}
  .tc-box label{font-size:14px;color:#555;line-height:1.5;cursor:pointer}

  /* TC section */
  .tc-section{background:#f8f8f8;border-radius:14px;padding:24px}
  .tc-section>div{margin-bottom:20px}
  .tc-section>div:last-child{margin-bottom:0}
  .tc-section h3{font-size:15px;font-weight:700;margin-bottom:6px;color:#111}
  .tc-section p{font-size:14px;color:#555;line-height:1.7;margin-bottom:0}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
  .modal-card{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.2)}
  .modal-header{padding:24px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:14px}
  .modal-header h2{font-size:20px;font-weight:700}
  .modal-header p{font-size:13px;color:#888}
  .modal-body{padding:24px;overflow-y:auto;flex:1}
  .modal-footer{padding:20px 24px;border-top:1px solid #eee;display:flex;gap:12px}
  .modal-footer>*{flex:1;padding:14px;font-size:14px}

  /* Dashboard */
  .dashboard{min-height:100vh;background:#f5f5f5}
  .dash-nav{background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:50}
  .dash-nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
  .dash-nav-left{display:flex;align-items:center;gap:12px}
  .dash-nav-logo{width:36px;height:36px;background:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:16px}
  .dash-nav-title{font-weight:700;font-size:17px;letter-spacing:-.3px}
  .dash-nav-sep{color:#ddd}
  .dash-nav-sub{color:#888;font-size:13px}
  .dash-nav-right{display:flex;align-items:center;gap:16px}
  .dash-nav-user{display:flex;align-items:center;gap:8px;background:#f5f5f5;border-radius:100px;padding:6px 14px 6px 6px}
  .dash-nav-avatar{width:28px;height:28px;border-radius:50%;background:#000;color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .dash-nav-name{font-size:14px;font-weight:500;color:#555}
  .dash-content{max-width:1200px;margin:0 auto;padding:28px 24px}
  .dash-welcome{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
  .dash-welcome h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .dash-welcome p{color:#888;font-size:14px;margin-top:2px}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{background:#fff;border-radius:18px;border:1px solid #eee;padding:22px}
  .stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .stat-value{font-size:28px;font-weight:800;letter-spacing:-1px}
  .stat-label{font-size:12px;color:#888;margin-top:2px;font-weight:500}
  .stat-sub{font-size:12px;color:#bbb;margin-top:4px}
  .tabs{display:inline-flex;gap:4px;background:#eee;border-radius:14px;padding:4px;margin-bottom:24px}
  .tab{padding:10px 22px;border-radius:10px;border:none;background:transparent;font-size:14px;font-weight:500;color:#888;cursor:pointer;transition:all .2s}
  .tab.active{background:#fff;color:#000;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .inventory-card{background:#fff;border-radius:18px;border:1px solid #eee;overflow:hidden}
  .inventory-toolbar{padding:16px 20px;border-bottom:1px solid #eee;display:flex;gap:12px;flex-wrap:wrap}
  .search-box{flex:1;min-width:200px;position:relative}
  .search-box input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;background:#fafafa;outline:none;transition:all .2s}
  .search-box input:focus{border-color:#000;background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb}
  .filter-btns{display:flex;gap:8px}
  .filter-btn{padding:10px 18px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#666}
  .filter-btn.active{background:#000;color:#fff}
  .filter-btn:hover:not(.active){background:#e5e5e5}
  .inventory-table{width:100%;border-collapse:collapse}
  .inventory-table th{text-align:left;padding:12px 20px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee}
  .inventory-table td{padding:16px 20px;font-size:14px;border-bottom:1px solid #f5f5f5}
  .inventory-table tr:hover td{background:#fafafa}
  .shoe-cell{display:flex;align-items:center;gap:12px}
  .shoe-thumb{width:48px;height:48px;background:#f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#999;flex-shrink:0}
  .shoe-name{font-weight:600;color:#111;font-size:14px}
  .shoe-brand{font-size:12px;color:#999;margin-top:1px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600}
  .status-available{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
  .status-sold{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
  .status-dot{width:6px;height:6px;border-radius:50%}
  .status-available .status-dot{background:#3b82f6}
  .status-sold .status-dot{background:#22c55e}
  .status-pending{background:#fef3c7;color:#d97706;border:1px solid #fcd34d}
  .status-pending .status-dot{background:#d97706}
  .price{font-weight:600}
  .date-text{font-size:13px;color:#999}
  .table-footer{padding:14px 20px;border-top:1px solid #eee;font-size:13px;color:#999}
  .empty-state{text-align:center;padding:60px 20px;color:#bbb}
  .empty-state .empty-title{font-weight:600;font-size:15px;color:#999;margin-top:8px}
  .profile-card{background:#fff;border-radius:18px;border:1px solid #eee;padding:32px}
  .profile-card h3{font-size:20px;font-weight:700;margin-bottom:24px}
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .profile-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:4px}
  .profile-field p{font-size:14px;font-weight:500;color:#111}
  .profile-full{margin-bottom:24px}
  .tc-status{display:flex;align-items:center;gap:8px;color:#22c55e;font-size:14px;font-weight:600;padding-top:20px;border-top:1px solid #eee}
  .add-modal-body{padding:24px}
  .add-modal-body .form-group{margin-bottom:16px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .dash-footer{border-top:1px solid #eee;margin-top:60px;padding:24px;text-align:center;font-size:12px;color:#bbb}

  /* KYC badge */
  .kyc-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:100px;background:#dcfce7;color:#16a34a;margin-left:8px}

  @media(max-width:768px){
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .landing-features{grid-template-columns:1fr}
    .feature-card{border-right:none;border-bottom:1px solid #e5e5e5}
    .hero-title{font-size:36px}
    .profile-grid{grid-template-columns:1fr}
    .landing-nav{padding:16px 20px}
    .landing-logo-text{display:none}
    .step-item{font-size:10px;padding:12px 4px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── API Helper ───
const api = {
  async get(url) {
    const res = await fetch(url, { credentials: "include" });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || res.statusText); }
    return res.json();
  },
  async post(url, body) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(body),
    });
    const d = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(d.error || res.statusText);
    return d;
  },
};

// ─── DigiLocker KYC Component ───
function DigiLockerKYC({onVerified, onStatusChange}) {
  const [status, setStatus] = useState("not_started");
  const [dlData, setDlData] = useState(null);
  const [error, setError] = useState(null);
  const pollRef = useRef(null);
  const popupRef = useRef(null);

  // Check DigiLocker status on mount (in case we're returning from OAuth redirect)
  useEffect(() => {
    checkStatus();
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, []);

  const checkStatus = async () => {
    try {
      const data = await api.get("/auth/digilocker/status");
      setDlData(data);
      setStatus(data.status);
      if (data.error) setError(data.error);
      if (data.status === "complete") {
        onVerified(data);
        if (pollRef.current) clearInterval(pollRef.current);
      }
      if (onStatusChange) onStatusChange(data.status);
    } catch (err) {
      console.error("Status check error:", err);
    }
  };

  const startPolling = () => {
    if (pollRef.current) clearInterval(pollRef.current);
    pollRef.current = setInterval(async () => {
      try {
        const data = await api.get("/auth/digilocker/status");
        setDlData(data);
        setStatus(data.status);
        if (data.error) setError(data.error);
        if (data.status === "complete" || data.status === "error") {
          clearInterval(pollRef.current);
          pollRef.current = null;
          if (data.status === "complete") onVerified(data);
          if (onStatusChange) onStatusChange(data.status);
        }
      } catch (err) {
        console.error("Polling error:", err);
      }
    }, 2000);
  };

  const initiateDigiLocker = () => {
    setStatus("pending");
    setError(null);
    if (onStatusChange) onStatusChange("pending");

    // Open DigiLocker in a new window/tab
    const popup = window.open(
      "/auth/digilocker/initiate",
      "digilocker",
      "width=600,height=700,scrollbars=yes,resizable=yes"
    );
    popupRef.current = popup;

    // Start polling for status updates
    startPolling();

    // Also listen for the popup closing (fallback)
    const checkClosed = setInterval(() => {
      if (popup && popup.closed) {
        clearInterval(checkClosed);
        // Do a final status check
        setTimeout(checkStatus, 1000);
      }
    }, 1000);
  };

  const resetDigiLocker = async () => {
    try {
      await api.post("/auth/digilocker/reset");
      setStatus("not_started");
      setDlData(null);
      setError(null);
      if (onStatusChange) onStatusChange("not_started");
    } catch (err) {
      console.error("Reset error:", err);
    }
  };

  const statusLabels = {
    not_started: "Not Started",
    pending: "Redirecting...",
    authenticating: "Authenticating...",
    fetching: "Fetching Documents...",
    complete: "Verified",
    error: "Failed",
  };

  const statusClass = status === "complete" ? "success" : status === "error" ? "error" : (status === "pending" || status === "authenticating" || status === "fetching") ? "active" : "pending";

  const isProcessing = ["pending", "authenticating", "fetching"].includes(status);

  return (
    <div className={`digilocker-card ${status === "complete" ? "complete" : status === "error" ? "error" : isProcessing ? "active" : ""}`}>
      <div className="dl-header">
        <div className="dl-logo"><Svg.DigiLocker /></div>
        <div className="dl-header-text">
          <h3>DigiLocker KYC Verification</h3>
          <p>Verify your Aadhaar & PAN via Government of India's DigiLocker</p>
        </div>
        <span className={`dl-status-badge ${statusClass}`}>
          {isProcessing && <span className="spinner-blue"></span>}
          {status === "complete" && <Svg.VerifiedBadge />}
          {statusLabels[status] || status}
        </span>
      </div>

      {status === "not_started" && (
        <>
          <div className="dl-steps">
            <strong>How it works:</strong>
            <ol>
              <li>Click the button below to open DigiLocker</li>
              <li>Log in with your Aadhaar-linked mobile number</li>
              <li>Grant consent to share your eAadhaar and ePAN</li>
              <li>Your documents are securely verified via UIDAI and Income Tax Dept</li>
            </ol>
          </div>
          <button className="btn-digilocker" onClick={initiateDigiLocker}>
            <Svg.DigiLocker /> Verify with DigiLocker <Svg.ExternalLink />
          </button>
          <p style={{fontSize:12,color:'#888',marginTop:10}}>You'll be redirected to DigiLocker (Government of India). A popup window will open for authentication.</p>
        </>
      )}

      {isProcessing && (
        <div style={{textAlign:'center',padding:'24px 0'}}>
          <div className="spinner-lg" style={{margin:'0 auto 16px'}}></div>
          <p style={{fontWeight:600,fontSize:15,marginBottom:4}}>
            {status === "pending" && "Redirecting to DigiLocker..."}
            {status === "authenticating" && "Exchanging credentials with DigiLocker..."}
            {status === "fetching" && "Fetching your eAadhaar & ePAN documents..."}
          </p>
          <p style={{fontSize:13,color:'#888'}}>
            {status === "pending" && "A popup window should open. Please complete the authentication there."}
            {status === "authenticating" && "Securely exchanging authorization code for access token."}
            {status === "fetching" && "Pulling your verified documents from UIDAI and Income Tax Department."}
          </p>
        </div>
      )}

      {status === "complete" && dlData && (
        <div className="dl-result">
          <div className={`dl-result-card ${dlData.aadhaarVerified ? "success" : "fail"}`}>
            <div className={`dl-result-icon ${dlData.aadhaarVerified ? "success" : "fail"}`}>
              {dlData.aadhaarVerified ? <Svg.VerifiedBadge /> : <Svg.X />}
            </div>
            <div className="dl-result-text">
              <div className="dl-result-title">
                Aadhaar {dlData.aadhaarVerified ? "Verified" : "Not Verified"}
              </div>
              <div className="dl-result-sub">
                {dlData.aadhaarVerified
                  ? `Verified via UIDAI · ${dlData.aadhaarData?.uid || "****"} · ${dlData.aadhaarData?.verifiedAt ? new Date(dlData.aadhaarData.verifiedAt).toLocaleString() : ""}`
                  : dlData.aadhaarError || "Could not verify Aadhaar"}
              </div>
            </div>
          </div>
          <div className={`dl-result-card ${dlData.panVerified ? "success" : "fail"}`}>
            <div className={`dl-result-icon ${dlData.panVerified ? "success" : "fail"}`}>
              {dlData.panVerified ? <Svg.VerifiedBadge /> : <Svg.X />}
            </div>
            <div className="dl-result-text">
              <div className="dl-result-title">
                PAN {dlData.panVerified ? "Verified" : "Not Verified"}
              </div>
              <div className="dl-result-sub">
                {dlData.panVerified
                  ? `Verified via Income Tax Dept (CBDT) · ${dlData.panData?.pan || "****"} · ${dlData.panData?.verifiedAt ? new Date(dlData.panData.verifiedAt).toLocaleString() : ""}`
                  : dlData.panError || "Could not verify PAN"}
              </div>
            </div>
          </div>
          {dlData.userInfo && (
            <div style={{marginTop:12,padding:'12px 16px',background:'#f8fafc',borderRadius:10,fontSize:13,color:'#555'}}>
              <strong>DigiLocker User:</strong> {dlData.userInfo.name || "—"} {dlData.userInfo.dob ? ` · DOB: ${dlData.userInfo.dob}` : ""}
            </div>
          )}
        </div>
      )}

      {status === "error" && (
        <div style={{padding:'16px 0'}}>
          <div className="alert-error" style={{marginBottom:16}}>
            {error || "DigiLocker verification failed. Please try again."}
          </div>
          <button className="btn-digilocker-outline" onClick={resetDigiLocker}>
            <Svg.Refresh /> Try Again
          </button>
        </div>
      )}
    </div>
  );
}

function RegisterPage({onRegister, onGoToLogin, onBack}) {

  const [dlVerified, setDlVerified] = useState(false);
  const [dlData, setDlData] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  const s = (f, v) => { setForm(p => ({...p, [f]: v})); setErrors(e => ({...e, [f]: null})); };

  // Validations
  const v1 = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Required";
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = "Valid email required";
    if (!form.password || form.password.length < 8) e.password = "Min 8 characters";
    setErrors(e);
    return Object.keys(e).length === 0;
  };
  const v2 = () => {
    const e = {};
    if (!form.gst.trim() || form.gst.trim().length < 15) e.gst = "15-char GST required";
    if (!form.address.trim()) e.address = "Required";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const next = () => {
    if (step === 1 && v1()) setStep(2);
    else if (step === 2 && v2()) setStep(3);
    else if (step === 3 && dlVerified) setStep(4);
    else if (step === 4 && tcAccepted) setStep(5);

            <div className="form-group"><label className="form-label">Password</label><div className="input-wrapper"><input type={showPw?"text":"password"} className={`form-input ${errors.password?'error':''}`} value={form.password} onChange={e=>s("password",e.target.value)} placeholder="Min. 8 characters" /><button className="input-toggle" onClick={()=>setShowPw(!showPw)}>{showPw?<Svg.EyeOff />:<Svg.Eye />}</button></div>{errors.password ? <div className="form-error">{errors.password}</div> : <div className="form-hint">Use a strong password with letters and numbers</div>}</div>
          </>)}

            <div className="form-group"><label className="form-label">GST Number</label><input className={`form-input ${errors.gst?'error':''}`} value={form.gst} onChange={e=>s("gst",e.target.value)} placeholder="e.g. 27AABCU9603R1ZM" />{errors.gst ? <div className="form-error">{errors.gst}</div> : <div className="form-hint">15-character GSTIN</div>}</div>
            <div className="form-group"><label className="form-label">Registered Address</label><textarea className={`form-input form-textarea ${errors.address?'error':''}`} value={form.address} onChange={e=>s("address",e.target.value)} placeholder="Full registered business address" />{errors.address && <div className="form-error">{errors.address}</div>}</div>
            <div className="form-group"><label className="form-label">Tax Invoices</label>
              <div style={{display:'flex',gap:8}}><input className="form-input" value={invoiceInput} onChange={e=>setInvoiceInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(e.preventDefault(),addInv())} placeholder="Invoice filename (e.g. INV-001.pdf)" style={{flex:1}} /><button className="btn-outline" onClick={addInv} style={{padding:'10px 14px',flexShrink:0}}><Svg.Upload /></button></div>
              {form.taxInvoices.length > 0 && <div className="chip-list">{form.taxInvoices.map((inv,i) => <span key={i} className="chip">{inv}<button className="chip-remove" onClick={()=>rmInv(i)}>&times;</button></span>)}</div>}
              <div className="form-hint">Add invoice references for your records</div>
            </div>
          </>)}

          {/* STEP 3: KYC via DigiLocker */}
          {step === 3 && (<>
            <div style={{marginBottom:8}}>
              <h3 style={{fontWeight:700,fontSize:17,marginBottom:4}}>KYC Document Verification</h3>
              <p style={{fontSize:14,color:'#888',lineHeight:1.5}}>Verify your identity using DigiLocker — the Government of India's official document verification platform. Your Aadhaar will be verified via UIDAI and PAN via Income Tax Department.</p>
            </div>

            <DigiLockerKYC onVerified={handleDlVerified} />

            {dlVerified && (
              <div style={{marginTop:20,padding:'14px 16px',background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:12,display:'flex',alignItems:'center',gap:10,color:'#16a34a',fontWeight:600,fontSize:14}}>
                <Svg.ShieldCheck /> KYC verification complete. You can proceed to the next step.
              </div>
            )}
          </>)}

          {/* STEP 4: Terms & Conditions */}
          {step === 4 && (<>
            <div style={{marginBottom:16}}>
              <h3 style={{fontWeight:700,fontSize:17,marginBottom:4}}>Terms & Conditions</h3>
              <p style={{fontSize:14,color:'#888'}}>Please read and accept the CDC Vendor Consignment Agreement to proceed.</p>
            </div>
            <div style={{background:'#f8f8f8',borderRadius:14,padding:24,maxHeight:'40vh',overflowY:'auto'}}>
              <div className="tc-section">
                <div><h3>1. Tax Compliance & Government Duties</h3><p>The vendor acknowledges that all applicable taxes, including Customs Duty, GST, Income Tax, and other government levies, shall be duly paid by the vendor. CDC shall not be held liable for any tax obligations arising from the vendor's consignment activities. The vendor must maintain valid GST registration and file returns as required by law.</p></div>
                <div><h3>2. Pricing Agreement</h3><p>All consignment and retail prices for footwear shall be mutually agreed upon between the vendor and CDC prior to listing. CDC reserves the right to suggest pricing adjustments based on market conditions, but no price changes will be made without the vendor's written consent.</p></div>
                <div><h3>3. Insurance & Liability</h3><p>CDC maintains insurance coverage for all consigned items while in CDC's possession. In the event of any loss, damage, theft, fire, natural disaster, or any other mishap, CDC's liability shall be strictly limited to the insured value of the affected items only. Compensation will be paid solely for items covered under the insurance policy at the time of the incident.</p></div>
                <div><h3>4. Consignment Terms</h3><p>Items consigned to CDC must be authentic, in the condition described, and accompanied by all original packaging. CDC reserves the right to authenticate all items and reject any that fail verification.</p></div>
                <div><h3>5. Payment Terms</h3><p>Upon successful sale, payment will be processed within 7-14 business days. CDC will deduct agreed commission before disbursement.</p></div>
                <div><h3>6. Document Verification</h3><p>All registration information (GST, PAN, Aadhaar, address) must be accurate and valid. Fraudulent documentation will result in immediate account termination.</p></div>
              </div>
            </div>
            <p style={{fontSize:12,color:'#bbb',marginTop:12}}>Last updated: February 2026 · Crep Dog Crew Private Limited</p>
            <div className="tc-box" onClick={() => setTcAccepted(!tcAccepted)} style={{marginTop:20}}>
              <input type="checkbox" checked={tcAccepted} onChange={() => {}} />
              <label>I have read and agree to the <strong>Terms & Conditions</strong> of Crep Dog Crew, including tax compliance obligations, pricing agreements, and insurance liability policies.</label>
            </div>
          </>)}

          {/* STEP 5: Review & Submit */}
          {step === 5 && (<>
            <h3 style={{fontWeight:700,marginBottom:16}}>Review & Submit</h3>
            {submitError && <div className="alert-error" style={{marginBottom:16}}>{submitError}</div>}
            <div className="review-grid">
              {[
                ["Business Name", form.name],
                ["Email", form.email],
                ["GST No.", form.gst],
                ["Address", form.address],
                ["Tax Invoices", form.taxInvoices.length > 0 ? form.taxInvoices.join(", ") : "None"],
              ].map(([l, v]) => <div key={l} className="review-row"><span className="review-label">{l}</span><span className="review-value">{v}</span></div>)}
            </div>
            <div style={{display:'flex',gap:12,marginTop:16}}>
              <div style={{flex:1,padding:'12px 16px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:12,fontSize:13,color:'#16a34a',fontWeight:600,display:'flex',alignItems:'center',gap:6}}><Svg.VerifiedBadge /> Aadhaar Verified (UIDAI via DigiLocker)</div>
              <div style={{flex:1,padding:'12px 16px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:12,fontSize:13,color:'#16a34a',fontWeight:600,display:'flex',alignItems:'center',gap:6}}><Svg.VerifiedBadge /> PAN Verified (CBDT via DigiLocker)</div>
            </div>
            <div style={{padding:'12px 16px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:12,fontSize:13,color:'#16a34a',fontWeight:600,display:'flex',alignItems:'center',gap:6,marginTop:12}}><Svg.Check /> Terms & Conditions Accepted</div>
            {dlData?.userInfo && (
              <div style={{padding:'12px 16px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,fontSize:13,color:'#555',marginTop:12}}>
                <strong>DigiLocker Identity:</strong> {dlData.userInfo.name || "—"} {dlData.userInfo.dob ? `· DOB: ${dlData.userInfo.dob}` : ""} · ID: {dlData.userInfo.digilockerId || "—"}
              </div>
            )}
          </>)}

          {/* Navigation Buttons */}
          <div className="form-actions" style={{marginTop:24}}>
            {step > 1 && <button className="btn-outline" onClick={() => setStep(step - 1)}>Back</button>}
            {step < 5 ? (
              step === 3
                ? <button className="btn-primary" onClick={next} disabled={!dlVerified}>Continue</button>
                : step === 4
                  ? <button className="btn-primary" onClick={next} disabled={!tcAccepted}>Accept & Continue</button>
                  : <button className="btn-primary" onClick={next}>Continue</button>
            ) : (
              <button className="btn-primary" onClick={submit} disabled={submitting}>
                {submitting ? "Creating Account..." : "Create Account"}
              </button>
            )}
          </div>
        </div>
      </div>
      <div className="auth-footer">Already have an account? <button onClick={onGoToLogin}>Sign in</button>{onBack && <span> · <button onClick={onBack}>Back to home</button></span>}</div>
    </div></div>
  );
}

// ─── Add Shoe Modal (single) ───
function AddShoeModal({show, onClose, onAdd}) {
  const [f, setF] = useState({brand:"",model:"",size:"",sku:"",condition:"Deadstock",bidPrice:""});
  const [submitting, setSubmitting] = useState(false);
  if (!show) return null;
  const handleAdd = async () => {
    if (!f.brand || !f.model || !f.size || !f.bidPrice) return;
    setSubmitting(true);
    try {
      const data = await api.post("/api/shoes", {...f, bidPrice: Number(f.bidPrice)});
      onAdd(data.shoe);
      setF({brand:"",model:"",size:"",sku:"",condition:"Deadstock",bidPrice:""});
      onClose();
    } catch(e) { alert(e.message); }
    setSubmitting(false);
  };
  const u = (k, v) => setF(p => ({...p, [k]: v}));
  return (
    <div className="modal-overlay" onClick={onClose}><div className="modal-card" style={{maxWidth:460}} onClick={e => e.stopPropagation()}>
      <div className="modal-header"><div><h2>Add Single Shoe</h2><p>Set your price — CDC will review and accept or negotiate</p></div><button className="btn-icon" onClick={onClose} style={{marginLeft:'auto'}}><Svg.X /></button></div>
      <div className="add-modal-body">
        {[{l:"Brand",k:"brand",p:"e.g. Nike"},{l:"Model",k:"model",p:"e.g. Air Jordan 1 Retro High OG"},{l:"Size",k:"size",p:"e.g. US 10"},{l:"SKU",k:"sku",p:"e.g. 555088-101"}].map(({l,k,p}) => <div key={k} className="form-group"><label className="form-label">{l}</label><input className="form-input" value={f[k]} onChange={e=>u(k,e.target.value)} placeholder={p} /></div>)}
        <div className="form-group"><label className="form-label">Condition</label><select className="form-input" value={f.condition} onChange={e=>u("condition",e.target.value)} style={{appearance:'none',paddingRight:16}}><option>Deadstock</option><option>VNDS</option><option>Used - Excellent</option><option>Used - Good</option></select></div>
        <div className="form-group"><label className="form-label">Your Price (\u20B9)</label><input type="number" className="form-input" value={f.bidPrice} onChange={e=>u("bidPrice",e.target.value)} placeholder="18500" /><div className="form-hint">This is your asking price. CDC will accept or make a counter-offer.</div></div>
      </div>
      <div className="modal-footer"><button className="btn-outline" onClick={onClose}>Cancel</button><button className="btn-primary" onClick={handleAdd} disabled={submitting}>{submitting ? "Submitting..." : "Submit for Review"}</button></div>
    </div></div>
  );
}

// ─── Bulk Upload Modal ───
function BulkUploadModal({show, onClose, onDone}) {
  const [rows, setRows] = useState([{brand:"",model:"",size:"",sku:"",condition:"Deadstock",bidPrice:""}]);
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  if (!show) return null;

  const addRow = () => setRows(r => [...r, {brand:"",model:"",size:"",sku:"",condition:"Deadstock",bidPrice:""}]);
  const removeRow = (i) => setRows(r => r.filter((_,j) => j !== i));
  const updateRow = (i, k, v) => setRows(r => r.map((row, j) => j === i ? {...row, [k]: v} : row));

  const handleSubmit = async () => {
    const valid = rows.filter(r => r.brand && r.model && r.size && r.bidPrice);
    if (valid.length === 0) return;
    setSubmitting(true);
    setResult(null);
    try {
      const data = await api.post("/api/shoes/bulk", { shoes: valid.map(r => ({...r, bidPrice: Number(r.bidPrice)})) });
      setResult(data);
      if (data.ok) onDone(data.shoes);
    } catch(e) { setResult({error: e.message}); }
    setSubmitting(false);
  };

  const validCount = rows.filter(r => r.brand && r.model && r.size && r.bidPrice).length;

  return (
    <div className="modal-overlay" onClick={onClose}><div className="modal-card" style={{maxWidth:720}} onClick={e => e.stopPropagation()}>
      <div className="modal-header"><div><h2>Bulk Upload Consignment</h2><p>Add multiple shoes at once — set your price for each pair</p></div><button className="btn-icon" onClick={onClose} style={{marginLeft:'auto'}}><Svg.X /></button></div>
      <div className="modal-body" style={{padding:20}}>
        {result && result.ok && (
          <div style={{padding:'14px 16px',background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:12,marginBottom:16,fontSize:14,color:'#16a34a',fontWeight:600}}>
            Successfully uploaded {result.added} shoes for review. {result.errors?.length > 0 && `(${result.errors.length} had errors)`}
          </div>
        )}
        {result && result.error && (
          <div className="alert-error" style={{marginBottom:16}}>{result.error}</div>
        )}
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:'2px solid #eee'}}>
              {["Brand*","Model*","Size*","SKU","Condition","Your Price*",""].map(h => <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:11,fontWeight:700,color:'#999',textTransform:'uppercase'}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map((row, i) => (
                <tr key={i} style={{borderBottom:'1px solid #f5f5f5'}}>
                  <td style={{padding:'6px 4px'}}><input className="form-input" style={{padding:'8px 10px',fontSize:13,minWidth:100}} value={row.brand} onChange={e=>updateRow(i,"brand",e.target.value)} placeholder="Nike" /></td>
                  <td style={{padding:'6px 4px'}}><input className="form-input" style={{padding:'8px 10px',fontSize:13,minWidth:160}} value={row.model} onChange={e=>updateRow(i,"model",e.target.value)} placeholder="Air Jordan 1..." /></td>
                  <td style={{padding:'6px 4px'}}><input className="form-input" style={{padding:'8px 10px',fontSize:13,minWidth:70}} value={row.size} onChange={e=>updateRow(i,"size",e.target.value)} placeholder="US 10" /></td>
                  <td style={{padding:'6px 4px'}}><input className="form-input" style={{padding:'8px 10px',fontSize:13,minWidth:90}} value={row.sku} onChange={e=>updateRow(i,"sku",e.target.value)} placeholder="555088-101" /></td>
                  <td style={{padding:'6px 4px'}}><select className="form-input" style={{padding:'8px 6px',fontSize:13,minWidth:100,appearance:'none'}} value={row.condition} onChange={e=>updateRow(i,"condition",e.target.value)}><option>Deadstock</option><option>VNDS</option><option>Used - Excellent</option><option>Used - Good</option></select></td>
                  <td style={{padding:'6px 4px'}}><input type="number" className="form-input" style={{padding:'8px 10px',fontSize:13,minWidth:90}} value={row.bidPrice} onChange={e=>updateRow(i,"bidPrice",e.target.value)} placeholder="18500" /></td>
                  <td style={{padding:'6px 4px'}}>{rows.length > 1 && <button className="btn-icon" onClick={() => removeRow(i)} style={{color:'#ef4444'}}><Svg.X /></button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <button className="btn-outline" onClick={addRow} style={{marginTop:12,display:'inline-flex',alignItems:'center',gap:6,fontSize:13,padding:'8px 16px'}}><Svg.Plus /> Add Another Row</button>
        <p style={{fontSize:12,color:'#aaa',marginTop:12}}>All prices will be reviewed by CDC. You'll be notified if CDC accepts your price or makes a counter-offer.</p>
      </div>
      <div className="modal-footer">
        <button className="btn-outline" onClick={onClose}>Cancel</button>
        <button className="btn-primary" onClick={handleSubmit} disabled={submitting || validCount === 0}>
          {submitting ? "Uploading..." : `Submit ${validCount} Shoe${validCount !== 1 ? 's' : ''} for Review`}
        </button>
      </div>
    </div></div>
  );
}

// ─── Bid Status Badge ───
function BidStatusBadge({shoe}) {
  const bidColors = {
    pending: {bg:"#fef3c7",color:"#d97706",border:"#fcd34d",label:"Pending Review"},
    accepted: {bg:"#dcfce7",color:"#16a34a",border:"#bbf7d0",label:"Accepted"},
    countered: {bg:"#dbeafe",color:"#1d4ed8",border:"#93c5fd",label:"Counter-Offer"},
    rejected: {bg:"#fee2e2",color:"#dc2626",border:"#fecaca",label:"Rejected"},
  };
  const c = bidColors[shoe.bidStatus] || bidColors.pending;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 12px',borderRadius:100,fontSize:12,fontWeight:600,background:c.bg,color:c.color,border:`1px solid ${c.border}`}}>{c.label}</span>;
}

// ─── Dashboard ───
function Dashboard({vendor, onLogout}) {
  const [shoes, setShoes] = useState([]);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [showAdd, setShowAdd] = useState(false);
  const [showBulk, setShowBulk] = useState(false);
  const [tab, setTab] = useState("inventory");
  const [loading, setLoading] = useState(true);

  // Fetch shoes from server on mount
  const fetchShoes = async () => {
    try {
      const data = await api.get("/api/shoes");
      setShoes(data);
    } catch(e) { console.error("Fetch shoes error:", e); }
    setLoading(false);
  };
  useEffect(() => { fetchShoes(); }, []);

  const acceptedShoes = shoes.filter(s => s.bidStatus === "accepted");
  const filtered = shoes.filter(s => {
    const m = `${s.brand} ${s.model} ${s.sku}`.toLowerCase().includes(search.toLowerCase());
    if (filter === "all") return m;
    if (filter === "available") return m && s.status === "available";
    if (filter === "sold") return m && s.status === "sold";
    if (filter === "pending") return m && (s.bidStatus === "pending" || s.bidStatus === "countered");
    return m;
  });
  const stats = {
    total: shoes.length,
    available: acceptedShoes.filter(s => s.status === "available").length,
    sold: acceptedShoes.filter(s => s.status === "sold").length,
    pending: shoes.filter(s => s.bidStatus === "pending" || s.bidStatus === "countered").length,
    earnings: acceptedShoes.filter(s => s.status === "sold").reduce((a, s) => a + (s.consignPrice || 0), 0),
  };

  const addShoe = (shoe) => { setShoes(prev => [...prev, shoe]); };
  const addBulkShoes = (newShoes) => { setShoes(prev => [...prev, ...newShoes]); };

  const respondToCounter = async (shoeId, action) => {
    try {
      const data = await api.post(`/api/shoes/${shoeId}/respond`, { action });
      setShoes(prev => prev.map(s => s.id === shoeId ? data.shoe : s));
    } catch(e) { alert(e.message); }
  };

  const handleLogout = async () => {
    try { await api.post("/api/vendors/logout"); } catch(e) {}
    onLogout();
  };

  const statusLabel = (s) => {
    if (s.status === "sold") return "Sold";
    if (s.status === "available") return "Available";
    if (s.status === "pending_review") return "Pending Review";
    if (s.status === "pending_vendor") return "Counter-Offer";
    if (s.status === "rejected") return "Rejected";
    return s.status;
  };
  const statusClass = (s) => {
    if (s.status === "sold") return "status-sold";
    if (s.status === "available") return "status-available";
    return "";
  };

  return (
    <div className="dashboard">
      <AddShoeModal show={showAdd} onClose={() => setShowAdd(false)} onAdd={addShoe} />
      <BulkUploadModal show={showBulk} onClose={() => setShowBulk(false)} onDone={addBulkShoes} />
      <nav className="dash-nav"><div className="dash-nav-inner">
        <div className="dash-nav-left"><div className="dash-nav-logo">C</div><span className="dash-nav-title">Crep Dog Crew</span><span className="dash-nav-sep">|</span><span className="dash-nav-sub">Vendor Portal</span></div>
        <div className="dash-nav-right"><div className="dash-nav-user"><div className="dash-nav-avatar">{vendor.name.charAt(0)}</div><span className="dash-nav-name">{vendor.name}</span></div><button className="btn-icon" onClick={handleLogout} title="Sign out"><Svg.Logout /></button></div>
      </div></nav>
      <div className="dash-content">
        <div className="dash-welcome">
          <div><h1>Welcome back, {vendor.name.split(" ")[0]}</h1><p>Here's an overview of your consignment activity.</p></div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-outline" onClick={() => setShowBulk(true)} style={{display:'inline-flex',alignItems:'center',gap:6}}><Svg.Upload /> Bulk Upload</button>
            <button className="btn-primary" onClick={() => setShowAdd(true)} style={{display:'inline-flex',alignItems:'center',gap:6}}><Svg.Plus /> Add Shoe</button>
          </div>
        </div>
        <div className="stats-grid">
          {[
            {label:"Total Pairs",value:stats.total,sub:`${stats.available} available`,icon:<Svg.Box />,bg:"#f5f5f5"},
            {label:"Sold",value:stats.sold,sub:`of ${stats.total} pairs`,icon:<Svg.TrendUp />,bg:"#f0fdf4"},
            {label:"Earnings",value:fmt(stats.earnings),sub:"from sold items",icon:<Svg.Dollar />,bg:"#eff6ff"},
            {label:"Pending Bids",value:stats.pending,sub:"awaiting CDC review",icon:<Svg.Clock />,bg:"#fffbeb"},
          ].map(s => <div key={s.label} className="stat-card"><div className="stat-icon" style={{background:s.bg}}>{s.icon}</div><div className="stat-value">{s.value}</div><div className="stat-label">{s.label}</div><div className="stat-sub">{s.sub}</div></div>)}
        </div>
        <div className="tabs">{[{id:"inventory",label:"Inventory"},{id:"bids",label:`Bids & Offers${stats.pending > 0 ? ` (${stats.pending})` : ""}`},{id:"profile",label:"My Profile"}].map(t => <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>{t.label}</button>)}</div>

        {tab === "inventory" && (
          <div className="inventory-card">
            <div className="inventory-toolbar"><div className="search-box"><span className="search-icon"><Svg.Search /></span><input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by brand, model, or SKU..." /></div><div className="filter-btns">{[{id:"all",l:"All"},{id:"available",l:"Available"},{id:"sold",l:"Sold"},{id:"pending",l:"Pending"}].map(f => <button key={f.id} className={`filter-btn ${filter===f.id?'active':''}`} onClick={() => setFilter(f.id)}>{f.l}</button>)}</div></div>
            <div style={{overflowX:'auto'}}><table className="inventory-table"><thead><tr>{["Shoe","Size","Condition","Your Price","Consign Price","Bid Status","Status","Date"].map(h => <th key={h}>{h}</th>)}</tr></thead><tbody>
              {loading
                ? <tr><td colSpan={8} style={{textAlign:'center',padding:40}}><span className="spinner-lg"></span></td></tr>
                : filtered.length === 0
                  ? <tr><td colSpan={8}><div className="empty-state"><Svg.Box /><p className="empty-title">No shoes found</p><p>Add your first pair to get started</p></div></td></tr>
                  : filtered.map(s => <tr key={s.id}>
                    <td><div className="shoe-cell"><div className="shoe-thumb">{s.brand.substring(0,2).toUpperCase()}</div><div><div className="shoe-name">{s.model}</div><div className="shoe-brand">{s.brand}{s.sku ? ` · ${s.sku}` : ""}</div></div></div></td>
                    <td>{s.size}</td><td>{s.condition}</td>
                    <td className="price">{fmt(s.bidPrice)}</td>
                    <td className="price">{s.consignPrice ? fmt(s.consignPrice) : <span style={{color:'#bbb'}}>—</span>}</td>
                    <td><BidStatusBadge shoe={s} /></td>
                    <td><span className={`status-badge ${statusClass(s)}`} style={!statusClass(s) ? {background:'#f5f5f5',color:'#888',border:'1px solid #e5e5e5'} : {}}><span className="status-dot" style={!statusClass(s) ? {background:'#999'} : {}}></span>{statusLabel(s)}</span></td>
                    <td className="date-text">{s.status === "sold" ? `Sold ${s.soldAt}` : `Added ${s.consignedAt}`}</td>
                  </tr>)}
            </tbody></table></div>
            {filtered.length > 0 && <div className="table-footer">Showing {filtered.length} of {shoes.length} shoes</div>}
          </div>
        )}

        {tab === "bids" && (
          <div className="inventory-card">
            <div style={{padding:'20px 24px',borderBottom:'1px solid #eee'}}>
              <h3 style={{fontWeight:700,fontSize:17,marginBottom:4}}>Bid Status & Counter-Offers</h3>
              <p style={{fontSize:14,color:'#888'}}>Track your pricing bids. When CDC makes a counter-offer, you can accept or reject it here.</p>
            </div>
            {shoes.filter(s => s.bidStatus !== "accepted" || s.status === "pending_vendor").length === 0 ? (
              <div className="empty-state" style={{padding:40}}><Svg.Check /><p className="empty-title" style={{marginTop:8}}>All bids resolved</p><p>No pending bids or counter-offers at this time.</p></div>
            ) : (
              <div style={{padding:16}}>
                {shoes.filter(s => s.bidStatus === "countered").map(s => (
                  <div key={s.id} style={{border:'2px solid #93c5fd',borderRadius:16,padding:20,marginBottom:12,background:'#f0f7ff'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{s.brand} {s.model}</div><div style={{fontSize:13,color:'#888'}}>{s.size} · {s.condition}{s.sku ? ` · ${s.sku}` : ""}</div></div>
                      <BidStatusBadge shoe={s} />
                    </div>
                    <div style={{display:'flex',gap:16,marginBottom:12,flexWrap:'wrap'}}>
                      <div style={{padding:'10px 16px',background:'#fff',borderRadius:10,border:'1px solid #e5e5e5'}}><div style={{fontSize:11,color:'#888',fontWeight:600}}>YOUR PRICE</div><div style={{fontSize:18,fontWeight:800}}>{fmt(s.bidPrice)}</div></div>
                      <div style={{display:'flex',alignItems:'center',fontSize:20,color:'#93c5fd'}}>{"\u2192"}</div>
                      <div style={{padding:'10px 16px',background:'#dbeafe',borderRadius:10,border:'1px solid #93c5fd'}}><div style={{fontSize:11,color:'#1d4ed8',fontWeight:600}}>CDC OFFER</div><div style={{fontSize:18,fontWeight:800,color:'#1d4ed8'}}>{fmt(s.counterPrice)}</div></div>
                    </div>
                    {s.counterNote && <p style={{fontSize:13,color:'#555',marginBottom:12,padding:'8px 12px',background:'#fff',borderRadius:8,border:'1px solid #e5e5e5',fontStyle:'italic'}}>CDC Note: "{s.counterNote}"</p>}
                    <div style={{display:'flex',gap:10}}>
                      <button className="btn-primary" style={{background:'#16a34a',padding:'10px 24px'}} onClick={() => respondToCounter(s.id, "accept")}>Accept {fmt(s.counterPrice)}</button>
                      <button className="btn-outline" style={{color:'#dc2626',borderColor:'#fecaca'}} onClick={() => respondToCounter(s.id, "reject")}>Reject Offer</button>
                    </div>
                  </div>
                ))}
                {shoes.filter(s => s.bidStatus === "pending").map(s => (
                  <div key={s.id} style={{border:'1.5px solid #fcd34d',borderRadius:16,padding:20,marginBottom:12,background:'#fffbeb'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{s.brand} {s.model}</div><div style={{fontSize:13,color:'#888'}}>{s.size} · {s.condition}{s.sku ? ` · ${s.sku}` : ""}</div></div>
                      <BidStatusBadge shoe={s} />
                    </div>
                    <div style={{marginTop:10}}><span style={{fontSize:13,color:'#888'}}>Your asking price:</span> <span style={{fontWeight:700,fontSize:16}}>{fmt(s.bidPrice)}</span></div>
                    <p style={{fontSize:12,color:'#d97706',marginTop:8}}>Waiting for CDC to review your price...</p>
                  </div>
                ))}
                {shoes.filter(s => s.bidStatus === "rejected").map(s => (
                  <div key={s.id} style={{border:'1.5px solid #fecaca',borderRadius:16,padding:20,marginBottom:12,background:'#fef2f2',opacity:0.7}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{s.brand} {s.model}</div><div style={{fontSize:13,color:'#888'}}>{s.size} · {s.condition}</div></div>
                      <BidStatusBadge shoe={s} />
                    </div>
                    <div style={{marginTop:8,fontSize:13,color:'#dc2626'}}>Your price of {fmt(s.bidPrice)} was not accepted.</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "profile" && (
          <div className="profile-card">
            <h3>Business Profile</h3>
            <div className="profile-grid">
              {[
                {l:"Business Name",v:vendor.name},
                {l:"Email",v:vendor.email},
                {l:"GST Number",v:vendor.gst},
                {l:"PAN Number",v:<span>{vendor.pan || "—"}{vendor.panVerified && <span className="kyc-badge"><Svg.VerifiedBadge /> Verified via CBDT</span>}</span>},
                {l:"Aadhaar",v:<span>{vendor.aadhaar || "—"}{vendor.aadhaarVerified && <span className="kyc-badge"><Svg.VerifiedBadge /> UIDAI Verified</span>}</span>},
                {l:"DigiLocker ID",v:vendor.digilockerId || "—"},
                {l:"Member Since",v:vendor.createdAt},
              ].map(({l,v}) => <div key={l} className="profile-field"><label>{l}</label><p>{v}</p></div>)}
            </div>
            <div className="profile-full"><div className="profile-field"><label>Registered Address</label><p>{vendor.address}</p></div></div>
            <div className="profile-full"><div className="profile-field"><label>Tax Invoices</label><div className="chip-list" style={{marginTop:6}}>{vendor.taxInvoices && vendor.taxInvoices.length > 0 ? vendor.taxInvoices.map((inv,i) => <span key={i} className="chip">{inv}</span>) : <p style={{fontSize:14,color:'#999'}}>No invoices uploaded</p>}</div></div></div>
            <div className="profile-full"><div className="profile-field"><label>KYC Verification</label>
              <div style={{display:'flex',gap:8,marginTop:6}}>
                <span className="kyc-badge" style={{marginLeft:0}}><Svg.VerifiedBadge /> Aadhaar: {vendor.aadhaarSource || "UIDAI via DigiLocker"}</span>
                <span className="kyc-badge" style={{marginLeft:0}}><Svg.VerifiedBadge /> PAN: {vendor.panSource || "CBDT via DigiLocker"}</span>
              </div>
            </div></div>
            <div className="tc-status"><Svg.Check /> Terms & Conditions accepted</div>
          </div>
        )}
      </div>
      <div className="dash-footer">Crep Dog Crew Pvt. Ltd. · Vendor Portal · 2026</div>
    </div>
  );
}

// ─── App ───
function App() {
  const [page, setPage] = useState("landing");
  const [vendor, setVendor] = useState(null);
  const [loading, setLoading] = useState(true);

  // Check if already logged in on mount
  useEffect(() => {
    api.get("/api/vendors/me")
      .then(v => { setVendor(v); setLoading(false); })
      .catch(() => { setLoading(false); });

    // Check URL params for DigiLocker redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get("digilocker")) {
      // User returned from DigiLocker — show register page
      setPage("register");
      // Clean URL
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }, []);

  if (loading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f9fa'}}>
        <div style={{textAlign:'center'}}>
          <div className="spinner-lg" style={{margin:'0 auto 16px'}}></div>
          <p style={{color:'#888',fontWeight:500}}>Loading...</p>
        </div>
      </div>
    );
  }

  if (vendor) return <Dashboard vendor={vendor} onLogout={() => { setVendor(null); setPage("landing"); }} />;
  if (page === "login") return <LoginPage onLogin={v => setVendor(v)} onGoToRegister={() => setPage("register")} onBack={() => setPage("landing")} />;
  if (page === "register") return <RegisterPage onRegister={v => setVendor(v)} onGoToLogin={() => setPage("login")} onBack={() => setPage("landing")} />;
  return <LandingPage onLogin={() => setPage("login")} onRegister={() => setPage("register")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
